<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEON Intelligance</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <div class="logo">AEON</div>
            <div class="status">SYSTEM ONLINE</div>
        </header>
        
        <main id="chat-container">
            <div id="messages" class="messages">
                <div class="message system">
                    <div class="content">Initialization complete. Waiting for input.</div>
                </div>
            </div>
        </main>

        <footer>
            <div class="input-area">
                <button id="voice-btn" class="icon-btn" title="Voice Input">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <input type="text" id="user-input" placeholder="Enter command..." autocomplete="off">
                <button id="send-btn" class="icon-btn" title="Send">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <div class="controls">
                <label class="toggle-switch">
                    <input type="checkbox" id="voice-output-toggle" checked>
                    <span class="slider"></span>
                    <span class="label">Voice Output</span>
                </label>
            </div>
        </footer>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
